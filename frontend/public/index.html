<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#00d4ff" />
    <meta name="description" content="Hunter Guiris CC - Geolocalización inteligente con IA" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hunter Guiris">
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Hunter Guiris CC</title>
  </head>
  <body>
    <noscript>Necesitas JavaScript para usar Hunter Guiris CC</noscript>
    <div id="root"></div>
    <script>
      // Registrar Service Worker para PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('Hunter Guiris CC: Service Worker registrado');
              
              // Detectar cuando vuelve internet
              window.addEventListener('online', () => {
                registration.active?.postMessage('ONLINE');
              });
            })
            .catch((error) => {
              console.log('Service Worker error:', error);
            });
        });
      }
    </script>
  </body>
</html>
